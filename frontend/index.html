<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mini-pbinfo | Atestat</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs/loader.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Outfit', 'sans-serif'],
            mono: ['JetBrains Mono', 'monospace'],
          },
          colors: {
            judge: {
              ac: '#22c55e',
              wa: '#ef4444',
              tle: '#f59e0b',
              ce: '#8b5cf6',
            }
          }
        }
      }
    }
  </script>
  <style>
    .monaco-editor { padding-top: 12px; }
    .verdict-ac { background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%); }
    .verdict-wa { background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%); }
    .verdict-tle { background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%); }
    .verdict-ce { background: linear-gradient(135deg, #8b5cf6 0%, #7c3aed 100%); }
  </style>
</head>
<body class="bg-slate-950 text-slate-100 font-sans min-h-screen">
  <header class="border-b border-slate-800 bg-slate-900/80 backdrop-blur">
    <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
      <h1 class="text-xl font-bold text-emerald-400 tracking-tight">Mini-pbinfo</h1>
      <span class="text-slate-500 text-sm">Atestat Informatică • C++</span>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-4 py-6">
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
      <!-- Lista probleme -->
      <aside class="lg:col-span-1">
        <div class="bg-slate-900/60 border border-slate-800 rounded-xl p-4">
          <h2 class="text-sm font-semibold text-slate-400 uppercase tracking-wider mb-3">Probleme</h2>
          <div id="problem-list" class="space-y-2">
            <div class="text-slate-500 text-sm py-4">Se încarcă...</div>
          </div>
        </div>

        <!-- Enunț -->
        <div id="problem-statement" class="mt-6 bg-slate-900/60 border border-slate-800 rounded-xl p-4 hidden">
          <h2 class="text-sm font-semibold text-slate-400 uppercase tracking-wider mb-3">Enunț</h2>
          <div id="statement-content" class="text-slate-300 text-sm leading-relaxed whitespace-pre-wrap"></div>
        </div>
      </aside>

      <!-- Editor + Verdict -->
      <div class="lg:col-span-2 space-y-6">
        <div class="bg-slate-900/60 border border-slate-800 rounded-xl overflow-hidden">
          <div class="px-4 py-2 border-b border-slate-800 flex items-center justify-between">
            <span class="text-sm font-medium text-slate-400">Editor C++</span>
            <button id="btn-submit" class="px-4 py-2 bg-emerald-600 hover:bg-emerald-500 text-white text-sm font-medium rounded-lg transition disabled:opacity-50 disabled:cursor-not-allowed">
              Trimite
            </button>
          </div>
          <div id="editor" class="h-80"></div>
        </div>

        <!-- Verdict -->
        <div id="verdict-panel" class="hidden">
          <div id="verdict-card" class="rounded-xl p-6 text-white shadow-lg">
            <div class="flex items-center gap-3 mb-2">
              <span id="verdict-icon" class="text-2xl">⏳</span>
              <span id="verdict-text" class="text-lg font-semibold">Se evaluează...</span>
            </div>
            <div id="verdict-stats" class="text-sm opacity-90 mt-2"></div>
            <div id="verdict-details" class="mt-3 text-sm font-mono bg-black/20 rounded p-3 hidden"></div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
